name: Restrict to Allowed Paths

on:
  pull_request:

jobs:
  block-paths:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        shell: bash
        id: check
        run: |
          cat "$GITHUB_EVENT_PATH"
          # technically zenith _is_ a fork of LSB, so we have to detect based on repo
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          BASE_REPO="${{ github.repository }}"
          FORK=true
          BRANCH=""

          if [ "$HEAD_REPO" = "$BASE_REPO" ]; then
            FORK=false
          fi

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            BRANCH="$GITHUB_REF_NAME"
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BRANCH=$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")
          fi

          echo "Fork: $FORK"
          echo "Branch: $BRANCH"

          if [ "$FORK" = "false" ] && [ "$BRANCH" = "base" ]; then
            echo "'base' branch is allowed to modify anything in the codebase"
            echo "should_continue=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$FORK" = "false" ]; then
            echo "All PRs should come from forks."
            echo "Please fork this repository and inform someone about deleting this branch."
            exit 1
          fi

          echo "should_continue=true" >> $GITHUB_OUTPUT

      - name: Check out the code
        if: steps.check.outputs.should_continue == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        if: steps.check.outputs.should_continue == 'true'
        id: changed
        shell: bash
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }} | paste -sd "," -)
          echo "CHANGED_FILES=$CHANGED_FILES" >> $GITHUB_ENV

      - name: Check for restricted path changes
        if: steps.check.outputs.should_continue == 'true'
        run: |
          if echo "$CHANGED_FILES" | sed 's/,/\n/g' | grep -qv "^modules/zenith-public"; then
            echo "🚫 Changes to restricted paths detected! Please do not modify files outside of the public modules directory."
            exit 1
          else
            echo "✅ No restricted changes."
          fi
