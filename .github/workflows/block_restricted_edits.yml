name: Restrict to Allowed Paths

on:
  pull_request:

jobs:
  block-paths:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        shell: bash
        id: check
        run: |
          # technically zenith _is_ a fork of LSB, so we have to detect based on repo
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          BASE_REPO="${{ github.repository }}"
          FORK=true
          BRANCH=""

          if [ "$HEAD_REPO" = "$BASE_REPO" ]; then
            FORK=false
          fi

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            BRANCH="$GITHUB_REF_NAME"
          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BRANCH=$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")
          fi

          echo "Fork: $FORK"
          echo "Branch: $BRANCH"

          if [ "$FORK" = "false" ] && [ "$BRANCH" = "base" ]; then
            echo "'base' branch is allowed to modify anything in the codebase"
            echo "should_continue=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$FORK" = "false" ]; then
            echo "All PRs should come from forks."
            echo "Please fork this repository and inform someone about deleting this branch."
            exit 1
          fi

          echo "should_continue=true" >> $GITHUB_OUTPUT

      - name: Check out the code
        if: steps.check.outputs.should_continue == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for restricted path changes
        if: steps.check.outputs.should_continue == 'true'
        shell: bash
        run: |
          #git fetch origin ${{ github.base_ref }}

          # due to the way github actions works internally, we can't use "git diff" with ".." directly on "github.sha"
          # but we want to use ".." so we don't consider changed files from other PRs since this source diverged
          # Wacky but it works: origin/${{ github.event.pull_request.base.ref }} is the HEAD of the target, so this checks tip-to-tip with the source and target
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}.. | paste -sd "," -)

          echo "Changed files:"
          echo "$CHANGED_FILES" | sed 's/,/\n/g'

          # Fail if any file is outside allowed directory
          if echo "$CHANGED_FILES" | sed 's/,/\n/g' | grep -qvE '^modules/zenith-public/'; then
            echo "🚫 Changes to restricted paths detected! Only files inside modules/zenith-public/ are allowed."
            exit 1
          fi

          echo "✅ No restricted changes."
          echo "CHANGED_FILES=$CHANGED_FILES" >> $GITHUB_ENV
